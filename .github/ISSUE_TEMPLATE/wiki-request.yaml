name: Wiki Request
description: Suggesting a new wiki to add
labels: ["enhancement"]
body:
  - type: textarea
    attributes:
      label: What would you like the wiki to cover?
    validations:
      required: true
  - type: textarea
    attributes:
      label: Why should this be added to the wiki?
    validations:
      required: true
  - type: textarea
    attributes:
      label: Where in the wiki should this go?
    validations:
      required: true
